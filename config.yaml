cvs:
  research:
    path: data/cv_research.pdf
    priority: 1
    description: "ML / AI safety / autonomy / robustness research CV"

  swe:
    path: data/cv_swe.pdf
    priority: 2
    description: "Software engineering internship CV"

search_profiles:
  - name: "ML research internship"
    cv: research
    keywords:
      - machine learning intern
      - AI research intern
      - PhD machine learning intern
      - robotics intern
      - autonomous vehicle intern
      - ML safety intern
      - neural network robustness intern
    target_jobs:
      - Research Scientist Intern
      - Machine Learning Intern
      - Machine Learning Engineering Intern
      - AI Research Intern
      - Robotics Research Intern
      - Autonomous Driving Intern

  - name: "Software engineering internship"
    cv: swe
    keywords:
      - software engineering intern
      - backend intern
      - infrastructure intern
      - Python intern
      - systems intern
    target_jobs:
      - Software Engineering Intern
      - Backend Intern
      - Infrastructure Intern

company_discovery:
  enabled: true
  seed_keywords:
    - machine learning autonomy internship
    - AI research internship robotics
    - autonomous vehicle machine learning intern
    - neural network robustness research intern
  max_companies_per_run: 20

known_companies:
  - name: NVIDIA
    careers_url: https://www.nvidia.com/en-us/about-nvidia/careers/
  - name: Tesla
    careers_url: https://www.tesla.com/careers/search/
  - name: Waymo
    careers_url: https://waymo.com/careers/
  - name: Toyota Research Institute
    careers_url: https://www.tri.global/careers
  - name: Zoox
    careers_url: https://zoox.com/careers/

email_sources:
  enabled: true
  max_recent_emails: 80
  sender_keywords:
    - linkedin
    - handshake
    - greenhouse
    - lever
    - workday
  content_keywords:
    - intern
    - internship
    - machine learning
    - artificial intelligence
    - research
    - software engineering
    - robotics
    - autonomy
    - autonomous

matching:
  threshold: 75
  notify_top_k: 10

notification:
  method: email